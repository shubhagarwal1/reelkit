<!doctype html>
<html><head><meta charset="utf-8"><style>
  :root{ --accent:#E01010; --safe-bottom:18% }
  html,body{margin:0;width:1080px;height:1920px;background:#080808;overflow:hidden;color:#fff;
    font-family:'Helvetica Neue',Arial,sans-serif}
  #stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .line{position:absolute;left:0;right:0;text-align:center;opacity:0;will-change:transform,opacity}
  .big{font-weight:900;font-size:150px;letter-spacing:-4px;line-height:0.92}
  .serif{font-family:Georgia,'Times New Roman',serif}
  .accent{color:var(--accent)}
  .num{font-weight:900;font-size:200px;letter-spacing:-6px;font-variant-numeric:tabular-nums}
  .label{font-weight:700;font-size:46px;letter-spacing:10px;text-transform:uppercase}
  .sub{font-weight:700;font-size:40px;letter-spacing:8px;text-transform:uppercase;opacity:.7}
  /* tile grid behind the counter */
  #grid{position:absolute;inset:8% 6%;display:grid;grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(7,1fr);gap:14px;opacity:0}
  #grid div{border-radius:10px;opacity:0;transform:scale(.6)}
  #bar{position:absolute;height:10px;background:var(--accent);width:0;left:50%;
    transform:translateX(-50%);border-radius:6px}
  .vig{position:absolute;inset:0;box-shadow:inset 0 0 320px 90px #000;pointer-events:none}
</style></head>
<body>
  <div id="stage">
    <div id="grid"></div>

    <div class="line big" id="hook">DON’T<br><span class="accent">BLINK.</span></div>

    <div class="line big" id="v1">EVERY<br>WEDDING</div>
    <div class="line num accent" id="v2">10,000</div>
    <div class="line sub" id="v2b" style="top:62%">PHOTOS. ONE DAY.</div>
    <div class="line big serif" id="v3">one perfect<br><span class="accent">moment.</span></div>

    <div class="line num" id="counter" style="top:38%">0</div>
    <div class="line label" id="clabel" style="top:60%">memories kept</div>

    <div class="line big" id="f1">FACE<br><span class="accent">SEARCH</span></div>
    <div class="line big" id="f2">INSTANT<br>ALBUMS</div>
    <div class="line big serif" id="f3">camera<span class="accent"> → </span>cloud</div>

    <div class="line serif" id="brand" style="font-size:190px;font-weight:700;letter-spacing:2px">SAMARO</div>
    <div class="line sub" id="tag" style="top:60%;opacity:.85">never lose a moment</div>
    <div class="line label accent" id="cta" style="top:70%;font-size:38px">link in bio</div>
  </div>
  <div id="bar" style="top:50%"></div>
  <div class="vig"></div>

  <script src="../gsap.min.js"></script>
  <script>
  gsap.ticker.lagSmoothing(0);
  // build the photo-tile grid (deterministic colors — stable across seeks)
  const grid=document.getElementById('grid');
  for(let i=0;i<35;i++){const d=document.createElement('div');
    const h=(i*37)%360; d.style.background=`linear-gradient(135deg,hsl(${h} 55% 42%),hsl(${(h+40)%360} 50% 28%))`;
    grid.appendChild(d);}
  const tiles=grid.children;

  const tl=gsap.timeline({paused:true, defaults:{ease:'power4.out'}});
  const slam=(el,t,hold=0.7)=>{
    tl.fromTo(el,{opacity:0,scale:1.35,y:50,rotation:-2},
                 {opacity:1,scale:1,y:0,rotation:0,duration:.34},t)
      .to(el,{opacity:0,scale:.9,y:-30,duration:.26,ease:'power2.in'},t+hold);
  };
  // life: slow continuous push on the whole stage
  tl.fromTo('#stage',{scale:1.0},{scale:1.09,duration:13,ease:'none'},0);

  // HOOK — biggest thing on frame 1, settles then whips out
  tl.fromTo('#hook',{opacity:1,scale:1.12,y:0},{opacity:1,scale:1,duration:.5,ease:'power3.out'},0)
    .to('#hook',{opacity:0,scale:1.4,y:-40,duration:.4,ease:'power2.in'},1.15);

  // VERSE
  slam('#v1',1.5,0.7);
  tl.fromTo('#v2',{opacity:0,scale:1.6},{opacity:1,scale:1,duration:.3},2.35)
    .to('#v2',{opacity:0,scale:.85,duration:.25,ease:'power2.in'},3.05);
  tl.fromTo('#v2b',{opacity:0,y:20},{opacity:.75,y:0,duration:.3},2.55).to('#v2b',{opacity:0,duration:.2},3.0);
  slam('#v3',3.3,1.0);

  // COUNTER + grid cascade
  tl.to('#grid',{opacity:1,duration:.3},4.7);
  tl.to(tiles,{opacity:.9,scale:1,duration:.5,stagger:{each:.03,from:'center'},ease:'power2.out'},4.7);
  tl.fromTo('#counter',{opacity:0,scale:1.2},{opacity:1,scale:1,duration:.4},4.8);
  tl.fromTo('#clabel',{opacity:0},{opacity:.9,duration:.4},5.0);
  const cnt={v:0}; const cEl=document.getElementById('counter');
  tl.to(cnt,{v:200000000,duration:2.6,ease:'power2.out',
    onUpdate:()=>{cEl.textContent=Math.floor(cnt.v).toLocaleString('en-US');}},4.9);
  tl.to(['#counter','#clabel'],{opacity:0,duration:.3},7.7);
  tl.to(tiles,{opacity:0,scale:.7,duration:.4,stagger:{each:.015,from:'edges'}},7.6);
  tl.to('#grid',{opacity:0,duration:.3},8.0);

  // FEATURE STABS (with accent bar wipe)
  slam('#f1',8.1,0.55); slam('#f2',8.85,0.55); slam('#f3',9.6,0.7);
  tl.fromTo('#bar',{width:0,opacity:0},{width:540,opacity:1,duration:.3},8.15)
    .to('#bar',{width:0,opacity:0,duration:.25},10.4);

  // FINALE — brand lock
  tl.fromTo('#brand',{opacity:0,scale:1.25,letterSpacing:'40px'},
                     {opacity:1,scale:1,letterSpacing:'2px',duration:.7,ease:'power3.out'},10.7);
  tl.fromTo('#tag',{opacity:0,y:20},{opacity:.85,y:0,duration:.5},11.3);
  tl.fromTo('#cta',{opacity:0,scale:1.3},{opacity:1,scale:1,duration:.4,ease:'back.out(2)'},11.7);
  tl.to({},{duration:1.0},12.0); // hold the endcard

  // ---- renderer + audio contract ----
  window.__duration = 13.0;
  window.__seek = (t)=>{ tl.pause(); tl.seek(t, false); };  // false: fire onUpdate so the counter renders per-frame
  window.__audio = [
    {type:'sub_boom',t:0.0},            // hook hit
    {type:'transition_whoosh',t:1.15},
    {type:'whoosh',t:1.5},{type:'noise_hit',t:2.35},{type:'whoosh',t:3.3},
    {type:'riser_short',t:4.5},{type:'sub_boom',t:4.8},        // counter drop
    {type:'tick',t:5.2},{type:'tick',t:5.7},{type:'tick',t:6.2},{type:'tick',t:6.8},{type:'tick',t:7.3},
    {type:'transition_whoosh',t:7.7},
    {type:'noise_hit',t:8.1},{type:'noise_hit',t:8.85},{type:'noise_hit',t:9.6},
    {type:'riser_long',t:9.7},                                  // build into finale
    {type:'sub_boom',t:10.7},{type:'chime',t:11.3},{type:'ding',t:11.7}   // brand lock
  ];
  Promise.all([document.fonts.ready]).then(()=>{ window.__ready=true; });
  </script>
</body></html>
