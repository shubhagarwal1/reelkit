<!doctype html>
<!-- reelkit motion-graphics film skeleton. Copy to <film>/index.html and author your timeline.
     The renderer (render_mograph.js) drives the four globals at the bottom. Keep full-bleed. -->
<html><head><meta charset="utf-8"><style>
  /* safe area: keep ALL text inside these insets — platform UI covers the edges */
  :root{ --safe-top:10%; --safe-bottom:18%; --safe-x:6%; --accent:#e01010 }
  html,body{margin:0;width:1080px;height:1920px;background:#0a0a0a;overflow:hidden;
    font-family:'Helvetica Neue',Arial,sans-serif;color:#fff}
  #stage{position:absolute;inset:0}
  /* HOOK: put the biggest element on frame 1 (t=0), no slow fade-in.
     ENDCARD: last ~1.5s = brand lock (logo + tagline + CTA) — pair with a STING in the audio cues. */
  .line{position:absolute;left:0;right:0;text-align:center;font-weight:800;
    font-size:120px;letter-spacing:-2px;opacity:0;will-change:transform,opacity}
  #l1{top:34%} #l2{top:46%} #l3{top:58%}
  .accent{color:var(--accent,#e01010)}
</style></head>
<body>
  <div id="stage">
    <div class="line" id="l1">EVERY MOMENT</div>
    <div class="line" id="l2">EVERY <span class="accent">FACE</span></div>
    <div class="line" id="l3">ONE PLATFORM</div>
  </div>

  <!-- GSAP loaded locally (CSP-safe / offline render). Drop gsap.min.js next to this file. -->
  <script src="../gsap.min.js"></script>
  <script>
    gsap.ticker.lagSmoothing(0);                 // deterministic stepping, no catch-up
    gsap.defaults({ ease: 'power4.out' });
    const BEAT = 0.46;                            // seconds/beat — set from recipe.rhythm.beat_sec
    const tl = gsap.timeline({ paused: true });
    ['#l1','#l2','#l3'].forEach((sel, i) => {
      tl.fromTo(sel, { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, i * 2 * BEAT);
    });
    tl.to('#stage', { scale: 1.06, duration: 4, ease: 'none' }, 0);   // slow push

    // ---- renderer contract (do not rename) ----
    window.__duration = tl.duration();            // total seconds
    window.__seek = (t) => { tl.pause(); tl.seek(t); };   // jump to exact time
    window.__audio = [                            // sound-design cues -> sfx/manifest.json types
      { type: 'whoosh', t: 0.0 },
      { type: 'thunk',  t: 2 * BEAT },
      { type: 'thunk',  t: 4 * BEAT },
      { type: 'sub_boom', t: tl.duration() - 0.5 }
    ];
    Promise.all([document.fonts.ready]).then(() => { window.__ready = true; });
  </script>
</body></html>
