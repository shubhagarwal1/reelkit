<!-- ============================================================================
  kinetic.rig.html — REFERENCE IMPLEMENTATION of the reel-scripting motion vocabulary.
  This is a real, shipped 30.9s reel (Samaro "Find Yourself"), kept verbatim as the
  base rig new reels copy patterns from. Asset paths (../launch5/assets/...) won't
  resolve in your project — READ it for the patterns, don't open it as-is:
    - helpers: splitWords / wavyIn / wavyOut / slideIn / slideOut / popIn
    - beatWave(tl, words, from, to, {amp,trav,snd}) — beat-locked hops + thunk cues
    - cue(type,t,gain) + drop(t,g) — the window.__audio contract
    - color-shutter logo endcard (preloaded tint variants -> flick -> slam on drop)
    - hard-clear after every text exit (the ghost-bleed rule from LESSONS.md)
    - the renderer contract: __duration / __audio / __ready / __seek=(t)=>{ ... }
  Scene cuts sit on real bar downbeats (header comment maps bars -> seconds).
============================================================================= -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --paper:#F6F5F3; --ink:#0A0A0A; --coral:#FF5A1F;
  --card:#FFFFFF; --mut:#8A8A86;
  --sans:"Inter",system-ui,sans-serif; --serif:"Instrument Serif",Georgia,serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  --sh:0 42px 92px rgba(20,18,16,0.18),0 10px 24px rgba(20,18,16,0.10);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);}
#stage{position:relative;width:1080px;height:1920px;background:var(--paper);color:var(--ink);font-family:var(--sans);overflow:hidden;
  perspective:1200px;perspective-origin:50% 46%;}
#bgdark{position:absolute;inset:0;background:var(--ink);opacity:0;z-index:2;will-change:opacity;
  background-image:radial-gradient(1100px 1100px at 50% 46%,transparent 40%,rgba(0,0,0,0.55) 100%);}
.dk{color:var(--paper);}
.word{display:inline-block;will-change:transform,opacity,filter;transform-origin:50% 100%;}
.coral{color:var(--coral);}
.serif{font-family:var(--serif);} .it{font-style:italic;}
.mono{font-family:var(--mono);}

/* HOOK */
#hook{position:absolute;inset:0;z-index:6;transform-style:preserve-3d;}
#folder{position:absolute;left:50%;top:61%;width:460px;height:330px;transform:translate(-50%,-50%) rotateZ(-7deg);
  transform-style:preserve-3d;opacity:0;z-index:7;}
#folder .back{position:absolute;inset:0;background:linear-gradient(160deg,#E7E4DF,#CFCbC4);border-radius:28px;box-shadow:var(--sh);}
#folder .tab{position:absolute;left:30px;top:-32px;width:170px;height:60px;background:var(--coral);border-radius:20px 20px 0 0;}
#folder .front{position:absolute;left:0;bottom:0;width:100%;height:70%;background:linear-gradient(160deg,#DAD6CF,#BFB9B0);
  border-radius:24px;transform-origin:bottom center;box-shadow:0 -8px 24px rgba(0,0,0,0.10) inset;}
#folder .lbl{position:absolute;left:0;right:0;top:40%;text-align:center;color:#7a756c;font-family:var(--mono);font-weight:700;font-size:26px;letter-spacing:7px;text-transform:uppercase;}
.fp{position:absolute;left:50%;top:56%;width:172px;height:228px;border-radius:16px;background-size:cover;background-position:center;
  box-shadow:var(--sh);opacity:0;z-index:8;border:7px solid #fff;filter:saturate(1.06) contrast(1.03);will-change:transform,opacity;}

/* SCENE 3 photo wall — "buried in everyone's photos" */
#wall{position:absolute;left:70px;right:70px;top:196px;z-index:5;opacity:0;
  display:grid;grid-template-columns:repeat(5,1fr);gap:18px;will-change:opacity;}

/* PROBLEM cards */
#problem{position:absolute;inset:0;z-index:8;transform-style:preserve-3d;}
.pcard{position:absolute;background:#161616;border:1px solid #2a2a2a;border-radius:32px;color:#EDEDEA;

.pcard .h{display:flex;align-items:center;gap:16px;font-weight:700;font-size:32px;margin-bottom:16px;}

/* phone */
.phone{position:absolute;left:50%;top:50%;width:600px;height:1200px;background:#fff;border-radius:66px;
  border:13px solid #0A0A0A;box-shadow:var(--sh);overflow:hidden;opacity:0;z-index:10;will-change:transform,opacity;}

#selfie{position:absolute;left:50%;top:40%;width:330px;height:330px;transform:translate(-50%,-50%) scale(0.7);border-radius:50%;
  border:8px solid var(--coral);object-fit:cover;opacity:0;z-index:12;box-shadow:0 0 60px rgba(255,90,31,0.55);will-change:transform,opacity;}
#scan{position:absolute;left:46px;right:46px;height:6px;top:24%;background:var(--coral);box-shadow:0 0 48px 10px var(--coral);opacity:0;z-index:13;}
.fbk{position:absolute;width:250px;height:250px;left:50%;top:40%;transform:translate(-50%,-50%);opacity:0;z-index:13;
  filter:drop-shadow(0 0 14px rgba(255,90,31,0.95));will-change:transform,opacity;}
.fbk::before,.fbk::after,.fbk i::before,.fbk i::after{content:"";position:absolute;width:56px;height:56px;border:8px solid var(--coral);}
.fbk::before{left:0;top:0;border-right:none;border-bottom:none;}
.fbk::after{right:0;top:0;border-left:none;border-bottom:none;}
.fbk i::before{left:0;bottom:0;border-right:none;border-top:none;}
.fbk i::after{right:0;bottom:0;border-left:none;border-top:none;}
#caplabel{position:absolute;left:0;right:0;top:80%;text-align:center;font-weight:800;font-size:44px;letter-spacing:2px;color:var(--ink);opacity:0;z-index:14;}
#gtop{position:absolute;left:0;right:0;top:88px;text-align:center;z-index:6;}
#gtop .b{font-weight:800;font-size:50px;} #gtop .b .y{font-family:var(--serif);font-style:italic;color:var(--coral);}
#gtop .c{font-family:var(--mono);font-weight:500;font-size:26px;color:var(--mut);margin-top:8px;}
#ggrid{position:absolute;left:40px;right:40px;top:210px;display:grid;grid-template-columns:repeat(2,1fr);gap:20px;z-index:6;}
#ggrid .gt{aspect-ratio:1;background-size:cover;background-position:center;border-radius:20px;opacity:0;position:relative;will-change:transform,opacity;}
#ggrid .gt.tick::after{content:"";position:absolute;inset:10px;border:5px solid var(--coral);border-radius:14px;opacity:0.9;}

/* notification */
#notif{position:absolute;left:90px;top:906px;width:900px;background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);border-radius:34px;box-shadow:var(--sh);
  padding:40px 44px;opacity:0;z-index:16;will-change:transform,opacity;}
#notif .top{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
#notif .ico{width:96px;height:96px;border-radius:24px;background:#161616;display:flex;align-items:center;justify-content:center;color:var(--coral);font-weight:800;font-size:48px;flex:0 0 auto;}
#notif .app{font-family:var(--mono);font-weight:600;font-size:26px;color:var(--mut);}
#notif h3{font-size:40px;font-weight:800;} #notif h3 .c{color:var(--coral);}
#notif .sub{color:var(--mut);font-size:26px;margin-top:8px;}

/* type lines */
.line{position:absolute;left:0;right:0;text-align:center;opacity:0;z-index:20;padding:0 90px;will-change:transform,opacity,filter;}
.big{font-size:118px;line-height:0.96;letter-spacing:-0.045em;font-weight:800;}
.big .lt{font-weight:300;}

/* lockup (S8) — exact spacing */
#slogo{position:absolute;left:50%;top:812px;width:322px;height:382px;transform:translate(-50%,-50%);object-fit:contain;opacity:0;z-index:24;will-change:transform,opacity,filter;}
.lk{position:absolute;left:0;right:0;text-align:center;opacity:0;z-index:24;}
#lk4{top:1120px;font-family:var(--serif);font-style:italic;font-size:74px;color:var(--ink);}
#lk3{top:1244px;font-family:var(--mono);font-weight:500;font-size:38px;letter-spacing:0.08em;color:var(--coral);}

#grain{position:absolute;inset:-50%;width:200%;height:200%;opacity:0.03;mix-blend-mode:multiply;pointer-events:none;z-index:40;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
#vig{position:absolute;inset:0;pointer-events:none;z-index:39;background:radial-gradient(1400px 1400px at 50% 50%,transparent 62%,rgba(20,18,16,0.09) 100%);}
</style>
<body>
<div id="stage">
  <div id="bgdark"></div>
  <div id="hook"><div id="folder"><div class="back"></div><div class="tab"></div><div class="front"></div><div class="lbl">Your Event</div></div></div>
  <div id="problem"></div>
  <div id="wall"></div><div id="wshade"></div>
  <div class="phone" id="phone"><div class="notch"></div>
    <img id="selfie" src="../launch5/assets/selfie.png">
    <div id="scan"></div><div class="fbk" id="fbkA"><i></i></div>
    <div id="caplabel">AI Face Search</div>
    <div id="gtop"><div class="b">Just <span class="y">You</span></div><div class="c">312 photos</div></div>
    <div id="ggrid"></div>
  </div>
  <div id="notif"><div class="top"><div class="ico">✦</div><div><div class="app">SAMARO · now</div></div></div>
    <h3><span class="c">312</span> new photos of you <span class="c">✦</span></h3><div class="sub">tap to open your gallery</div></div>

  <div class="line" id="hook2" style="top:25%;font-family:var(--serif);font-style:italic;font-size:120px;">One wedding.</div>
  <div class="line dk serif it" id="q1" style="top:60%;font-size:84px;">But where are</div>
  <div class="line dk serif it" id="q2" style="top:66.5%;font-size:84px;">the ones with <span class="coral">you</span>?</div>

  <div class="line big dk" id="pay3" style="top:56%;text-align:left;">Just your <span class="serif it coral" style="font-weight:400;">face.</span></div>

  <img id="slogo" src="../launch5/assets/S_00.png">

  <div class="lk" id="lk3">events.samaro.ai</div>

  <div id="vig"></div><div id="grain"></div>
</div>

<script src="../gsap.min.js"></script>
<script>
gsap.ticker.lagSmoothing(0);
gsap.defaults({ease:"power3.out"});
const END=30.9;
const sIMG=i=>"../launch5/assets/S_"+String(i).padStart(2,"0")+".png";
const P=i=>"../launch5/assets/photos/p_"+String(i).padStart(2,'0')+".png";
const AUDIO=[]; const cue=(t,at,g)=>AUDIO.push({type:t,t:at,g:g});
/* rich, punchy drop = layered low body + detuned boom + transient crack */
const drop=(at,g)=>{ cue("boom",at,(g??1)*1.0); cue("boom",at+0.012,(g??1)*0.6); cue("hit",at,(g??1)*0.58); };
/* ===== SOUND BUDGET — ~31s, readable pacing. 3 swooshes (act boundaries only), rich drop at
   the CLIMAX face-lock + the logo lock, latch/glass/ui_confirm accents ride the beat ===== */
// S1 · HOOK
cue("latch",1.033,0.72); cue("glass",1.80,0.42); cue("chime",2.53,0.36);
// S2 · PROBLEM
cue("hit",4.969,0.5); cue("latch",5.48,0.6); cue("glass",5.979,0.4); cue("click",6.467,0.3); cue("click",6.943,0.28);
// S3 · QUESTION
cue("hit",8.905,0.44); cue("chime",9.404,0.4); cue("glass",10.00,0.36);
// S4 · FACESEARCH — CLIMAX
cue("swoosh",12.60,0.62);                          // ACT 1→2 : into the reveal
cue("glass",13.40,0.4); cue("riser",14.20,0.75); drop(14.803,1.0); cue("glass",15.10,0.44);
// S5 · GALLERY
cue("ui_confirm",16.776,0.6); cue("latch",17.30,0.5); cue("latch",17.80,0.48); cue("latch",18.30,0.46); cue("latch",18.739,0.44);
// S6 · PROOF
cue("glass",20.712,0.42); cue("ui_confirm",21.70,0.72); cue("chime",22.674,0.4);
// S7 · PAYOFF
cue("swoosh",24.50,0.62);                          // ACT 2→3 : into the payoff
cue("hit",24.648,0.44); cue("hit",25.146,0.44); cue("glass",25.646,0.5); cue("hit",26.61,0.3);
// S8 · CTA
cue("swoosh",28.45,0.6);                           // into the lockup
// (logo shutter clicks + final drop are cued in the SCENE 8 timeline code)

/* ---- wavy per-word lyric text ---- */
function splitWords(el){
  const nodes=[...el.childNodes]; el.innerHTML=''; const words=[];
  nodes.forEach(n=>{
    if(n.nodeType===3){ n.textContent.split(/(\s+)/).forEach(tok=>{
      if(tok.trim()===''){ if(tok) el.appendChild(document.createTextNode(tok)); }
      else { const s=document.createElement('span'); s.className='word'; s.textContent=tok; el.appendChild(s); words.push(s);} });
    } else if(n.tagName==='BR'){ el.appendChild(n); }
    else { n.classList.add('word'); el.appendChild(n); words.push(n); }
  });
  return words;
}
function wavyIn(tl,sel,at,{stagger=0.06,dur=0.6}={}){
  const el=document.querySelector(sel); const ws=el.__w||(el.__w=splitWords(el));
  tl.set(el,{opacity:1},at);
  // clean rise with a small controlled overshoot (no wild elastic warp)
  ws.forEach((w,i)=>tl.fromTo(w,{yPercent:110,autoAlpha:0,filter:"blur(3px)"},
    {yPercent:0,autoAlpha:1,filter:"blur(0px)",duration:dur,ease:"back.out(1.5)"},at+i*stagger));
  return ws;
}
function wavyOut(tl,sel,at,st=0.04){
  const el=document.querySelector(sel); const ws=el.__w||[];
  ws.forEach((w,i)=>tl.to(w,{yPercent:-70,autoAlpha:0,filter:"blur(6px)",duration:0.4,ease:"power2.in",overwrite:"auto"},at+i*st));
  // hard-clear the CONTAINER after exit: a lingering wavyIn tween writes child words back to
  // autoAlpha:1, but parent opacity:0 can't be overridden by a child.
  tl.set(el,{opacity:0},at+0.4+ws.length*st+0.03);
}
/* beat-synced ripple: on each song beat inside [from,to] a small wave travels through the
   words (bobs px `y`, independent of wavyIn's yPercent) — text dances to the lyrics. */
const BEATS=[0.07,0.557,1.033,1.544,2.043,2.531,3.007,3.518,3.994,4.493,4.969,5.48,5.979,6.467,6.943,7.43,7.93,8.429,8.905,9.404,9.903,10.391,10.879,11.378,11.865,12.365,12.841,13.34,13.839,14.327,14.803,15.302,15.801,16.289,16.776,17.264,17.775,18.262,18.739,19.261,19.737,20.236,20.712,21.211,21.711,22.198,22.674,23.185,23.673,24.172,24.648,25.136,25.646,26.134,26.61,27.109,27.609,28.108,28.584,29.083,29.582,30.07,30.546];
const STRONGB=BEATS.filter((_,i)=>i%2===0);   // ~0.98s groove pulse (not every sub-beat — less jittery)
function beatWave(tl,ws,from,to,{amp=17,trav=0.045,snd=true}={}){
  STRONGB.filter(b=>b>=from && b<=to).forEach(b=>{
    ws.forEach((w,i)=>tl.to(w,{y:-amp,duration:0.15,yoyo:true,repeat:1,ease:"power2.out",overwrite:false},b+i*trav));
    if(snd) cue("thunk",b,0.32);   // soft tap on each hop → the jump now MEANS something (synced to the beat)
  });
}
/* SLIDE signature — locked to the "zye zye" bar downbeats: words slide IN from the right and
   later slide OUT to the left (a left-flowing conveyor, reads as forward motion on the beat). */
function slideIn(tl,sel,at,{dur=0.6,from=580,stagger=0.05}={}){
  const el=document.querySelector(sel); const ws=el.__w||(el.__w=splitWords(el));
  tl.set(el,{opacity:1},at);
  ws.forEach((w,i)=>tl.fromTo(w,{x:from,autoAlpha:0,filter:"blur(4px)"},
    {x:0,autoAlpha:1,filter:"blur(0px)",duration:dur,ease:"power4.out"},at+i*stagger));
  return ws;
}
/* pop entrance — scale up with overshoot (a different "switch" than the slide) */
function popIn(tl,sel,at,{dur=0.52,stagger=0.05}={}){
  const el=document.querySelector(sel); const ws=el.__w||(el.__w=splitWords(el));
  tl.set(el,{opacity:1},at);
  ws.forEach((w,i)=>tl.fromTo(w,{scale:0.42,autoAlpha:0,filter:"blur(4px)"},
    {scale:1,autoAlpha:1,filter:"blur(0px)",duration:dur,ease:"back.out(2.4)",transformOrigin:"50% 60%"},at+i*stagger));
  return ws;
}
function slideOut(tl,sel,at,{st=0.04,to=-560}={}){
  const el=document.querySelector(sel); const ws=el.__w||[];
  ws.forEach((w,i)=>tl.to(w,{x:to,autoAlpha:0,filter:"blur(5px)",duration:0.42,ease:"power3.in",overwrite:"auto"},at+i*st));
  tl.set(el,{opacity:0},at+0.42+ws.length*st+0.03);
}

/* ---- build dynamic bits ---- */
const facePhotos=[47,21,30,14,42,49,22,16];
const hook=document.getElementById('hook'); const flyEls=[];
for(let i=0;i<7;i++){ const d=document.createElement('div'); d.className='fp'; d.id='fp'+i;
  d.style.backgroundImage=`url(${P(facePhotos[i])})`; hook.appendChild(d); flyEls.push(d); }
document.getElementById('problem').innerHTML=`
  <div class="pcard" id="pc0" style="left:120px;top:560px;width:660px;"><div class="h"><span class="dot" style="background:#25D366;"></span>Wedding Guests</div>
    <div class="row"><span class="thumb" style="background-image:url(${P(4)})"></span>Ramesh: sharing all pics here 📸</div>
    <div class="row"><span class="thumb" style="background-image:url(${P(27)})"></span>+ 500 photos in the album…</div></div>
  <div class="pcard" id="pc1" style="left:140px;top:1000px;width:600px;transform:rotate(-4deg);filter:grayscale(1);"><div class="h"><span class="dot" style="background:#4285F4;"></span>Photos_Final_v3</div>
    <div class="row">4,127 files · scroll to find yourself…</div></div>
  <div class="pcard" id="pc2" style="left:360px;top:1300px;width:560px;transform:rotate(5deg);"><div class="row" style="font-family:var(--serif);font-style:italic;font-size:34px;color:#cfcfcb;margin:0;">1,000+ photos to dig through</div></div>`;
const badge=document.createElement('div'); badge.id='badge'; badge.textContent='237 unread';
badge.style.left='690px'; badge.style.top='560px'; document.getElementById('problem').appendChild(badge);
const gg=document.getElementById('ggrid');
facePhotos.forEach((i,k)=>{ const d=document.createElement('div'); d.className='gt'+((k===1||k===2)?' tick':''); d.style.backgroundImage=`url(${P(i)})`; gg.appendChild(d); });
/* SCENE 3 photo wall: 5x4 grid of many photos — "buried in everyone's photos" */
// preload every S color variant so the logo shutter can swap src with zero flash mid-render
const preload=document.createElement('div'); preload.style.cssText='position:absolute;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none';
for(let i=0;i<=10;i++){ const im=new Image(); im.src=sIMG(i); preload.appendChild(im); }
document.body.appendChild(preload);
const wall=document.getElementById('wall');
const wallPhotos=[3,8,12,19,24,29,34,39,44,50,1,6,11,17,23,28,35,41,46,52];
const wtiles=[];
wallPhotos.forEach(n=>{ const d=document.createElement('div'); d.className='wt';
  d.style.backgroundImage=`url(${P(n)})`; wall.appendChild(d); wtiles.push(d); });

/* ================= TIMELINE — ~31s, 2 bars/scene, readable holds, slide on the beat =========
   Bar downbeats ("zye zye" accents): 1.03 3.01 4.97 6.94 8.91 10.88 12.84 14.80 16.78 18.74
   20.71 22.67 24.65 26.61 28.58 30.55.  ACTS: build (S1-3) → CLIMAX face-lock (S4) → resolve (S5-8). */
const tl=gsap.timeline({paused:true});
